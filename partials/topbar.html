<div x-data="topbarApp()" x-init="init()" style="display:contents;">

  <div class="flex items-center gap-4">
    <button class="icon-btn menu-toggle" type="button" @click="sidebarOpen = !sidebarOpen" title="Abrir menu" aria-label="Abrir menu">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/>
      </svg>
    </button>
    <button class="icon-btn" type="button" @click="goBack()" title="Voltar" aria-label="Voltar">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <div class="topbar-title">
      <h1 x-text="greeting">Olá!</h1>
      <span class="text-muted" x-text="todaySummary"></span>
    </div>
  </div>

  <div class="topbar-actions">
    <div class="topbar-search" style="position:relative;">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="text" placeholder="Buscar paciente pelo nome…" aria-label="Buscar paciente pelo nome" x-model="query" @input="onSearchInput()" @focus="showResults = query.trim().length >= 2" @blur="closeSearchDelayed()">

      <div x-show="showResults" x-cloak class="card card-shadow" style="position:absolute;top:calc(100% + 6px);left:0;width:280px;padding:8px;z-index:70;max-height:320px;overflow-y:auto;">
        <div x-show="searching" class="text-xs text-muted" style="padding:8px;">Buscando…</div>
        <div x-show="!searching && results.length === 0" class="text-xs text-muted" style="padding:8px;">Nenhum paciente encontrado.</div>
        <template x-for="p in results" :key="p.id">
          <div @mousedown.prevent="goToPatient(p)" style="padding:8px;border-radius:var(--radius-md);cursor:pointer;" class="topbar-search-result">
            <div class="text-sm" x-text="p.full_name" style="font-weight:600;"></div>
            <div class="text-xs text-muted" x-text="p.phone || 'sem telefone'"></div>
          </div>
        </template>
      </div>
    </div>

    <div style="position:relative;">
      <button class="icon-btn" type="button" title="Lembretes" aria-label="Lembretes" @click="showReminders = !showReminders">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9a6 6 0 0 1 12 0c0 4 1.5 5.5 1.5 5.5H4.5S6 13 6 9z"/><path d="M10 18a2 2 0 0 0 4 0"/>
        </svg>
        <span class="dot" style="background:var(--color-danger);" x-show="reminders.length > 0"></span>
      </button>

      <div x-show="showReminders" x-cloak @click.outside="showReminders = false" class="card card-shadow" style="position:absolute;top:calc(100% + 6px);right:0;width:320px;padding:8px;z-index:70;max-height:400px;overflow-y:auto;">
        <p class="text-xs text-muted mb-2" style="padding:4px 8px;">Lembretes e pendências</p>
        <div x-show="remindersLoading" class="text-xs text-muted" style="padding:8px;">Carregando…</div>
        <div x-show="!remindersLoading && reminders.length === 0" class="text-xs text-muted" style="padding:8px;">Nada pendente por aqui.</div>
        <template x-for="(r, i) in reminders" :key="i">
          <div class="topbar-search-result" style="padding:8px;border-radius:var(--radius-md);border-left:3px solid transparent;" :style="'border-left-color:' + severityColor(r.severity)">
            <a :href="r.href" style="display:block;text-decoration:none;">
              <span class="text-sm" :style="'color:' + severityColor(r.severity) + ';font-weight:600;'" x-text="r.label"></span>
              <div class="text-xs text-muted mt-1" x-show="r.sublabel" x-text="r.sublabel"></div>
            </a>
            <button type="button" class="btn btn-ghost btn-sm mt-1" x-show="r.completable" @click.prevent="completeReminder(r)" style="padding:2px 8px;height:auto;font-size:11px;">Marcar como concluído</button>
          </div>
        </template>
      </div>
    </div>

    <a href="vendas.html?nova=1" class="btn btn-secondary btn-sm">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;">
        <circle cx="9" cy="21" r="1.4"/><circle cx="18" cy="21" r="1.4"/><path d="M2.5 3h2.5l2.6 12.4a2 2 0 0 0 2 1.6h8a2 2 0 0 0 2-1.6L21.5 8H6"/>
      </svg>
      Nova venda
    </a>

    <a href="pacientes.html?novo=1" class="btn btn-primary btn-sm">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;">
        <path d="M12 5v14"/><path d="M5 12h14"/>
      </svg>
      Novo paciente
    </a>
  </div>

</div>
