<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Entrar · Prisma Gestão de Clínicas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">

<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark" style="background:var(--color-accent);color:var(--color-primary-dark);">P</div>
      <h1>Prisma · Gestão de Clínicas</h1>
      <p>Acesse o painel da sua clínica</p>
    </div>

    <form x-data="loginForm()" x-init="init()" @submit.prevent="submit()">
      <div class="form-group">
        <label class="label" for="email">E-mail</label>
        <input class="input" type="email" id="email" x-model="email" placeholder="voce@clinica.com.br" required>
      </div>

      <div class="form-group">
        <label class="label" for="senha">Senha</label>
        <div style="position:relative;">
          <input class="input" :type="showPass ? 'text' : 'password'" id="senha" x-model="password" placeholder="••••••••" required style="padding-right:56px;">
          <button type="button" @click="showPass = !showPass" class="text-xs text-muted" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;">
            <span x-text="showPass ? 'ocultar' : 'ver'"></span>
          </button>
        </div>
      </div>

      <p x-show="errorMsg" x-cloak class="text-sm mb-3" style="color:var(--color-danger);" x-text="errorMsg"></p>

      <button class="btn btn-primary btn-block mt-2" type="submit" :disabled="loading">
        <span x-show="!loading">Entrar</span>
        <span x-show="loading" x-cloak>Entrando…</span>
      </button>
    </form>

    <div class="auth-footer">
      Esqueceu a senha? Fale com a administração da clínica.<br>
      Sistema interno · Prisma Creative
    </div>
  </div>
</div>

<script>
function loginForm() {
  return {
    email: '',
    password: '',
    loading: false,
    showPass: false,
    errorMsg: '',
    init() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('desativado') === '1') {
        this.errorMsg = 'Este acesso foi desativado. Fale com a administração da clínica.';
      }
    },
    async submit() {
      this.errorMsg = '';
      this.loading = true;
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: this.email,
        password: this.password
      });
      if (error) {
        this.errorMsg = error.message || 'E-mail ou senha incorretos.';
        this.loading = false;
        return;
      }
      let role = null;
      if (data.user) {
        // Tenta buscar o papel já com is_active; se a coluna ainda não
        // existir nesse banco (migration 018 pendente), cai para buscar só
        // o papel, pra login não parar de funcionar por causa disso.
        let profile = null;
        const withStatus = await supabaseClient.from('users').select('role, is_active').eq('id', data.user.id).single();
        if (!withStatus.error) {
          profile = withStatus.data;
        } else {
          const roleOnly = await supabaseClient.from('users').select('role').eq('id', data.user.id).single();
          profile = roleOnly.data;
        }
        role = profile ? profile.role : null;
        if (profile && profile.is_active === false) {
          await supabaseClient.auth.signOut();
          this.errorMsg = 'Este acesso foi desativado. Fale com a administração da clínica.';
          this.loading = false;
          return;
        }
      }
      window.location.href = window.homeForRole(role);
    }
  };
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/include.js" defer></script>
</body>
</html>
